    <rect class="stroke-faded" stroke-width="1.5" x="1010" y="385" width="120" height="80" rx="3"/>
  </g>
  <g class="module-name module-r3">
    <text class="label-faded" x="1070" y="431" font-size="16" font-weight="500" text-anchor="middle">wallet</text>
  </g>

