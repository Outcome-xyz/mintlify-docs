  </g>

  <path class="connector-dotted" d="M 450 425 L 480 425" mask="url(#mask-l1)"/>
  <path class="connector-dotted" d="M 750 425 L 720 425" mask="url(#mask-r1)"/>
  <path class="connector-dotted" d="M 260 465 L 260 515 L 560 515" mask="url(#mask-l2)"/>
  <path class="connector-dotted" d="M 940 465 L 940 515 L 640 515" mask="url(#mask-r2)"/>
  <path class="connector-dotted" d="M 130 465 L 130 540 L 540 540 L 540 515" mask="url(#mask-l3)"/>
  <path class="connector-dotted" d="M 1070 465 L 1070 540 L 660 540 L 660 515" mask="url(#mask-r3)"/>
