    </mask>
    <mask id="mask-l3" maskUnits="userSpaceOnUse" x="0" y="0" width="1200" height="820">
      <rect x="0" y="0" width="1200" height="820" fill="black"/>
      <path class="reveal-mask m-l3" d="M 130 465 L 130 540 L 540 540 L 540 515"/>
    </mask>
    <mask id="mask-r1" maskUnits="userSpaceOnUse" x="0" y="0" width="1200" height="820">
      <rect x="0" y="0" width="1200" height="820" fill="black"/>
      <path class="reveal-mask m-r1" d="M 750 425 L 720 425"/>
    </mask>
    <mask id="mask-r2" maskUnits="userSpaceOnUse" x="0" y="0" width="1200" height="820">
      <rect x="0" y="0" width="1200" height="820" fill="black"/>
      <path class="reveal-mask m-r2" d="M 940 465 L 940 515 L 640 515"/>
    </mask>
    <mask id="mask-r3" maskUnits="userSpaceOnUse" x="0" y="0" width="1200" height="820">
      <rect x="0" y="0" width="1200" height="820" fill="black"/>
      <path class="reveal-mask m-r3" d="M 1070 465 L 1070 540 L 660 540 L 660 515"/>
    </mask>
    <mask id="mask-outcome" maskUnits="userSpaceOnUse" x="0" y="0" width="1200" height="820">
      <rect x="0" y="0" width="1200" height="820" fill="black"/>
      <path class="reveal-mask m-outcome" d="M 600 210 L 600 335"/>
    </mask>
    <mask id="mask-hip4" maskUnits="userSpaceOnUse" x="0" y="0" width="1200" height="820">
      <rect x="0" y="0" width="1200" height="820" fill="black"/>
      <path class="reveal-mask m-hip4" d="M 600 645 L 600 515"/>
    </mask>
    <mask id="mask-app-left" maskUnits="userSpaceOnUse" x="0" y="0" width="1200" height="820">
      <rect x="0" y="0" width="1200" height="820" fill="black"/>
      <path class="reveal-mask m-app-left" d="M 200 230 L 200 325 L 510 325 L 510 335"/>
    </mask>
    <mask id="mask-app-right" maskUnits="userSpaceOnUse" x="0" y="0" width="1200" height="820">
      <rect x="0" y="0" width="1200" height="820" fill="black"/>
      <path class="reveal-mask m-app-right" d="M 1000 230 L 1000 325 L 690 325 L 690 335"/>
    </mask>
  </defs>

  <g class="grid-layer">
    <rect fill="url(#dots-bg)" x="12" y="52" width="1176" height="746"/>
  </g>

