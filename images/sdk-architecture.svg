<?xml version="1.0" encoding="UTF-8"?>
<svg class="root" viewBox="38 78 1124 694" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" role="img" aria-label="HIP-4 SDK stack: outcome's connector summons the SDK; box draws itself in response to each connection">

  <style>
    svg.root {
      --diagram-bg: #fafafa;
    }
    @media (prefers-color-scheme: dark) {
      svg.root { --diagram-bg: #0a0a0a; }
    }

    .bg-fill            { fill: var(--diagram-bg); }
    .stroke             { stroke: #171717; fill: none; }
    .stroke-faded       { stroke: #171717; opacity: 0.32; fill: none; }
    .stroke-band-bright { stroke: #171717; opacity: 0.7; fill: none; }
    .stroke-band-faded  { stroke: #171717; opacity: 0.28; fill: none; }

    .label          { fill: #171717; font-family: ui-monospace, 'SF Mono', 'Geist Mono', Menlo, monospace; }
    .label-faded    { fill: #171717; opacity: 0.45; font-family: ui-monospace, 'SF Mono', 'Geist Mono', Menlo, monospace; }
    .faint          { fill: #a3a3a3; font-family: ui-monospace, 'SF Mono', 'Geist Mono', Menlo, monospace; }
    .grid-dot       { fill: #171717; }
    .icon-fill      { fill: #171717; }
    .icon-fill-faded { fill: #171717; opacity: 0.5; }

    .connector-dotted {
      stroke: #171717;
      stroke-width: 1;
      stroke-dasharray: 3 4;
      fill: none;
      opacity: 0.55;
    }
    .reveal-mask {
      stroke: #fff;
      stroke-width: 4;
      fill: none;
      stroke-linecap: square;
    }

    @media (prefers-color-scheme: dark) {
      .stroke             { stroke: #e5e5e5; }
      .stroke-faded       { stroke: #e5e5e5; opacity: 0.32; }
      .stroke-band-bright { stroke: #e5e5e5; opacity: 0.7; }
      .stroke-band-faded  { stroke: #e5e5e5; opacity: 0.28; }
      .connector-dotted   { stroke: #e5e5e5; }
      .label              { fill: #fafafa; }
      .label-faded        { fill: #fafafa; opacity: 0.45; }
      .faint              { fill: #525252; }
      .grid-dot           { fill: #fafafa; }
      .icon-fill          { fill: #e5e5e5; }
      .icon-fill-faded    { fill: #e5e5e5; opacity: 0.5; }
    }

    .grid-layer { animation: fadeIn 500ms cubic-bezier(0.2, 0.8, 0.2, 1) 0ms both; }
    .corner-ticks {
      animation: drawIn 600ms cubic-bezier(0.2, 0.8, 0.2, 1) 0ms both;
      stroke-dasharray: 80; stroke-dashoffset: 80;
    }
    .meta-strip { animation: fadeIn 300ms ease-out 150ms both; }

    .layer-band-apps { opacity: 0; animation: fadeInBandFaded 600ms cubic-bezier(0.2, 0.8, 0.2, 1) 200ms forwards; }
    .layer-band-sdk  { opacity: 0; animation: fadeInBandBright 600ms cubic-bezier(0.2, 0.8, 0.2, 1) 300ms forwards; }
    .layer-band-hip4 { opacity: 0; animation: fadeInBandFaded 600ms cubic-bezier(0.2, 0.8, 0.2, 1) 400ms forwards; }

    .spine-outcome { opacity: 0; animation: fadeIn 500ms ease-out 600ms forwards; }
    .spine-hip4    { opacity: 0; animation: fadeIn 500ms ease-out 700ms forwards; }
    .outcome-icon {
      opacity: 0;
      transform: scale(0.85);
      animation: iconPop 600ms cubic-bezier(0.34, 1.4, 0.5, 1) 600ms forwards;
      transform-box: fill-box;
      transform-origin: center;
    }
    .app-side-left  { opacity: 0; animation: fadeInFaded 700ms ease-out 800ms forwards; }
    .app-side-right { opacity: 0; animation: fadeInFaded 700ms ease-out 900ms forwards; }

    .m-outcome  { --len: 125; --dur: 1200ms; --delay: 1100ms; }
    .m-app-left { --len: 415; --dur: 1600ms; --delay: 1100ms; }
    .m-app-right{ --len: 415; --dur: 1500ms; --delay: 1200ms; }
    .m-hip4     { --len: 130; --dur: 3300ms; --delay: 1200ms; }

    .module-box {
      opacity: 0;
      animation: fadeIn 700ms cubic-bezier(0.25, 0.7, 0.3, 1) forwards;
    }
    .module-l3 { animation-delay: 2700ms; }
    .module-r3 { animation-delay: 2700ms; }
    .module-l2 { animation-delay: 3000ms; }
    .module-r2 { animation-delay: 3000ms; }
    .module-l1 { animation-delay: 3200ms; }
    .module-r1 { animation-delay: 3200ms; }

    .module-name {
      opacity: 0;
      transform: translateY(4px);
      animation: riseFaded 500ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      transform-box: fill-box;
      transform-origin: center;
    }
    .module-name.module-l3 { animation-delay: 2900ms; }
    .module-name.module-r3 { animation-delay: 2900ms; }
    .module-name.module-l2 { animation-delay: 3200ms; }
    .module-name.module-r2 { animation-delay: 3200ms; }
    .module-name.module-l1 { animation-delay: 3400ms; }
    .module-name.module-r1 { animation-delay: 3400ms; }

    .m-l1 { --len: 30;  --dur: 200ms;  --delay: 3200ms; }
    .m-r1 { --len: 30;  --dur: 200ms;  --delay: 3200ms; }
    .m-l2 { --len: 350; --dur: 1200ms; --delay: 3000ms; }
    .m-r2 { --len: 350; --dur: 1200ms; --delay: 3000ms; }
    .m-l3 { --len: 510; --dur: 1300ms; --delay: 2700ms; }
    .m-r3 { --len: 510; --dur: 1300ms; --delay: 2700ms; }

    .reveal-mask {
      stroke-dasharray: var(--len);
      stroke-dashoffset: var(--len);
      animation: maskGrow var(--dur) cubic-bezier(0.4, 0.05, 0.2, 1) var(--delay) forwards;
    }

    .sdk-edge {
      stroke: #171717;
      stroke-width: 2;
      fill: none;
      stroke-dasharray: var(--len);
      stroke-dashoffset: var(--len);
      animation: maskGrow var(--dur) cubic-bezier(0.25, 0.46, 0.45, 0.94) var(--delay) forwards;
    }
    @media (prefers-color-scheme: dark) {
      .sdk-edge { stroke: #e5e5e5; }
    }
    .sdk-edge-top-left  { --len: 120; --dur: 400ms;  --delay: 2300ms; }
    .sdk-edge-top-right { --len: 120; --dur: 400ms;  --delay: 2300ms; }
    .sdk-edge-left      { --len: 180; --dur: 700ms;  --delay: 2700ms; }
    .sdk-edge-right     { --len: 180; --dur: 700ms;  --delay: 2700ms; }
    .sdk-edge-bot-left  { --len: 120; --dur: 1100ms; --delay: 3400ms; }
    .sdk-edge-bot-right { --len: 120; --dur: 1100ms; --delay: 3400ms; }

    .sdk-fill {
      opacity: 0;
      animation: fadeIn 600ms cubic-bezier(0.22, 0.61, 0.36, 1) 4600ms forwards;
    }

    .sdk-summon-glow {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation: summonGlow 1200ms cubic-bezier(0.25, 0.46, 0.45, 0.94) 4900ms forwards;
    }

    .spine-sdk-label {
      opacity: 0;
      animation: labelRise 900ms cubic-bezier(0.22, 0.61, 0.36, 1) 4500ms forwards;
      transform-box: fill-box;
      transform-origin: center;
    }

    @keyframes fadeIn            { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeInBandBright  { from { opacity: 0; } to { opacity: 0.7; } }
    @keyframes fadeInBandFaded   { from { opacity: 0; } to { opacity: 0.28; } }
    @keyframes fadeInFaded       { from { opacity: 0; } to { opacity: 0.45; } }
    @keyframes maskGrow          { to { stroke-dashoffset: 0; } }
    @keyframes drawIn            { to { stroke-dashoffset: 0; } }
    @keyframes riseFaded {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 0.65; transform: translateY(0); }
    }
    @keyframes iconPop {
      0%   { opacity: 0; transform: scale(0.85); }
      70%  { opacity: 1; transform: scale(1.04); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes summonGlow {
      0%   { opacity: 0; transform: scale(1); }
      30%  { opacity: 0.35; transform: scale(1.015); }
      100% { opacity: 0; transform: scale(1.06); }
    }
    @keyframes labelRise {
      0%   { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; animation-delay: 0ms !important; }
      .reveal-mask { stroke-dashoffset: 0; }
      .module-name { opacity: 0.65; }
      .app-side-left, .app-side-right { opacity: 0.45; }
      .layer-band-apps, .layer-band-hip4 { opacity: 0.28; }
      .layer-band-sdk { opacity: 0.7; }
      .sdk-edge { stroke-dashoffset: 0; }
      .sdk-fill { opacity: 1; }
      .sdk-summon-glow { opacity: 0; }
    }
  </style>

  <defs>
    <pattern id="dots-bg" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle class="grid-dot" cx="1" cy="1" r="1" opacity="0.06"/>
    </pattern>

    <symbol id="outcome-icon-fixed" viewBox="0 0 21 24">
      <path class="icon-fill" d="M19.6079 0.838318L13.8672 10.7582H8.29171L6.85653 13.2401H0L4.7937 4.97834H5.67462C8.6294 4.97834 11.3676 3.39335 12.8468 0.838318H19.6079Z"/>
      <path class="icon-fill" d="M20.7124 10.759L15.9297 19.0207H15.0488C12.083 19.0207 9.34849 20.5947 7.8656 23.1607H1.10449L6.85253 13.2408H12.4281L13.8632 10.759H20.7124Z"/>
    </symbol>

    <mask id="mask-l1" maskUnits="userSpaceOnUse" x="0" y="0" width="1200" height="820">
      <rect x="0" y="0" width="1200" height="820" fill="black"/>
      <path class="reveal-mask m-l1" d="M 450 425 L 480 425"/>
    </mask>
